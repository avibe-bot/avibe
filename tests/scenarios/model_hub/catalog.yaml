version: 1
capability:
  id: model_hub
  name: Model Hub source resolution and supply configuration
  canonical_tests:
    - tests/test_model_hub_api.py
    - tests/test_model_hub_config.py
    - tests/test_model_hub_resolution.py
    - tests/test_model_hub_injection.py
    - tests/scenarios/model_hub/test_model_hub_native_oauth_scenarios.py
    - tests/scenarios/model_hub/test_model_hub_live_resolution_scenarios.py
status_legend:
  covered: closed-loop scenario coverage exists
  partial: unit or contract coverage exists but the cross-lane loop is incomplete
  gap: owned by a later lane or integration pass
scenarios:
  - id: MH-RES-LIVE-001
    name: Live turn retries an eligible backup before streaming starts
    status: covered
    kind: recovery
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_live_resolution_scenarios.py::test_mh_res_live_001_pre_stream_failure_falls_back_within_turn
  - id: MH-RES-LIVE-002
    name: Live turn refreshes one 401 exactly once
    status: covered
    kind: recovery
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_live_resolution_scenarios.py::test_mh_res_live_002_401_refreshes_once_in_live_turn
  - id: MH-RES-LIVE-003
    name: Live turn never retries after response streaming starts
    status: covered
    kind: compatibility
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_live_resolution_scenarios.py::test_mh_res_live_003_started_stream_never_retries
  - id: MH-EVT-002
    name: Causal switch events survive service restart
    status: covered
    kind: recovery
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_live_resolution_scenarios.py::test_mh_evt_002_switch_events_survive_router_and_service_restart
  - id: MH-RES-001
    name: Quota-exhausted failover and recovery switchback
    status: partial
    kind: recovery
    layer: unit
    test: tests/test_model_hub_resolution.py::test_quota_failure_cools_source_switches_and_emits_redacted_events
  - id: MH-PRI-001
    name: Priority reorder takes effect on the next turn
    status: partial
    kind: ordering
    layer: unit_contract
    test: tests/test_model_hub_api.py::test_model_hub_rest_api_contract
  - id: MH-MAP-001
    name: Mapping applies to Claude Code only
    status: partial
    kind: mapping
    layer: unit_contract
    test: tests/test_model_hub_resolution.py::test_mapping_is_scoped_to_the_requesting_backend
  - id: MH-OC-001
    name: OpenCode identifiers stay stable across mode switches
    status: covered
    kind: stability
    layer: scenario
    test: tests/test_model_hub_injection.py::test_mh_ovl_001_identifiers_stay_stable_across_all_perturbations
  - id: MH-CHAN-001
    name: Native subscription exhaustion falls back and recovers per turn
    status: covered
    kind: recovery
    layer: scenario
    test: tests/test_model_hub_injection.py::test_mh_chan_001_native_quota_falls_back_then_recovers_next_turn
  - id: MH-INJ-CLAUDE-001
    name: Claude Hub launch uses environment-only gateway injection
    status: covered
    kind: injection
    layer: scenario
    test: tests/test_model_hub_injection.py::test_mh_inj_runtime_injection_never_writes_native_configs
  - id: MH-INJ-CODEX-001
    name: Codex Hub launch uses app-server runtime overrides
    status: covered
    kind: injection
    layer: scenario
    test: tests/test_model_hub_injection.py::test_mh_inj_runtime_injection_never_writes_native_configs
  - id: MH-INJ-OPENCODE-001
    name: OpenCode overlay changes drain work and restart with hash metadata
    status: covered
    kind: injection
    layer: scenario
    test: tests/test_model_hub_injection.py::test_mh_inj_opencode_overlay_change_drains_then_restarts_and_records_hash
  - id: MH-INJ-DIRECT-001
    name: Direct launches preserve native configuration and omit Hub injection
    status: covered
    kind: compatibility
    layer: scenario
    test: tests/test_model_hub_injection.py::test_mh_inj_runtime_injection_never_writes_native_configs
  - id: MH-OVL-001
    name: OpenCode visible identifiers survive source and runtime perturbations
    status: covered
    kind: stability
    layer: scenario
    test: tests/test_model_hub_injection.py::test_mh_ovl_001_identifiers_stay_stable_across_all_perturbations
  - id: MH-MIG-001
    name: Migration copies without modifying native configuration
    status: covered
    kind: migration
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_migration_scenarios.py::test_mh_mig_001_api_apply_keeps_native_tree_byte_identical
  - id: MH-MIG-002
    name: Native OAuth subscriptions remain in sanctioned CLI stores
    status: covered
    kind: migration
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_migration_scenarios.py::test_mh_mig_002_oauth_defaults_to_native_sources
  - id: MH-MIG-003
    name: Experimental mode keeps native OAuth files in their CLI stores
    status: covered
    kind: migration
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_migration_scenarios.py::test_mh_mig_003_experimental_flag_keeps_oauth_native
  - id: MH-OAUTH-A-001
    name: Paste-code OAuth happy path
    status: partial
    kind: oauth
    layer: contract
    test: tests/test_model_hub_api.py::test_model_hub_rest_api_contract
  - id: MH-OAUTH-B-001
    name: Device-code OAuth happy path
    status: gap
    kind: oauth
    layer: scenario
  - id: MH-OAUTH-C-001
    name: Callback-replay OAuth happy path
    status: gap
    kind: oauth
    layer: scenario
  - id: MH-OAUTH-ERR-001
    name: OAuth timeout and cancel terminate cleanly
    status: partial
    kind: timeout_cancel
    layer: contract
    test: tests/test_model_hub_api.py::test_model_hub_rest_api_contract
  - id: MH-OAUTH-NATIVE-001
    name: Claude native CLI paste-code login persists an active Source
    status: covered
    kind: oauth
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_native_oauth_scenarios.py::test_mh_oauth_native_001_claude_paste_code_happy_path
  - id: MH-OAUTH-NATIVE-002
    name: Codex native CLI device-code login self-completes and persists its account Source
    status: covered
    kind: oauth
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_native_oauth_scenarios.py::test_mh_oauth_native_002_codex_device_code_self_completes
  - id: MH-OAUTH-NATIVE-003
    name: Native CLI OAuth cancel, timeout, and signed-out state terminate safely
    status: covered
    kind: timeout_cancel
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_native_oauth_scenarios.py::test_mh_oauth_native_003_cancel_and_timeout_terminate_cleanly
  - id: MH-OAUTH-CONSENT-001
    name: Experimental hub OAuth requires and persists explicit consent before Source creation
    status: covered
    kind: oauth_consent
    layer: scenario
    test: tests/scenarios/model_hub/test_model_hub_native_oauth_scenarios.py::test_mh_oauth_consent_001_is_required_and_persisted
next_priority:
